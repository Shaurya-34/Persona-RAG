services:
  - type: web
    name: rag-persona-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KMP_DUPLICATE_LIB_OK
        value: "TRUE"
    # Note: If you want to auto-rebuild the index on every deploy, 
    # change the buildCommand to: 
    # pip install -r requirements.txt && python data_pipeline.py && python persona_builder.py
